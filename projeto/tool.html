<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>GameRpg — VTT / Editor</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Toggle Button para Sidebar -->
  <button id="toggleBtn">☰</button>

  <!-- Sidebar com Ferramentas -->
  <div id="sidebar">
    <h3>Ferramentas</h3>

    <!-- Controles de Escala -->
    <div id="scaleBox">
      <input type="number" id="cellMeters" placeholder="metros por célula">
      <button id="applyScale">Aplicar escala</button>
      <div id="scaleInfo" style="margin-top:8px;"></div>
    </div>

    <hr>

    <!-- Setup de Mapa -->
    <div id="mapSetup">
      <input type="file" id="imgUpload">
      <label>Largura (células)</label>
      <input type="number" id="imgW" value="10">
      <label>Altura (células)</label>
      <input type="number" id="imgH" value="10">
      <button id="applyMap">Aplicar mapa</button>
    </div>

    <!-- Controles de Edição de Mapas (gerado dinamicamente) -->
    <div id="mapEditList" style="margin-top:10px;"></div>

    <hr>

    <!-- Controles de Tokens -->
    <div id="tokenControls">
      <input type="file" id="tokenImageUpload" accept="image/*" style="display:none;">
      <button id="addTokenBtn">+ Adicionar Token</button>
      <input type="file" id="enemyTokenImageUpload" accept="image/*" style="display:none;">
      <button id="addEnemyTokenBtn">+ Adicionar Token Inimigo</button>
      <button id="tokenDrawerBtn" class="drawer-toggle" type="button" aria-expanded="false">Tokens adicionados</button>
      <div id="tokenDrawerContent" class="drawer-content" style="display:none;">
        <div id="tokenList" style="margin-top:12px;"></div>
      </div>
      <button id="enemyTokenDrawerBtn" class="drawer-toggle" type="button" aria-expanded="false">Tokens inimigos</button>
      <div id="enemyTokenDrawerContent" class="drawer-content" style="display:none;">
        <div id="enemyTokenList" style="margin-top:12px;"></div>
      </div>

      <hr>

      <!-- Ferramentas de Cenário -->
      <div id="toolsControls">
        <button id="toolsDrawerBtn" class="drawer-toggle tools-toggle" type="button" aria-expanded="false">🛠️ Ferramentas</button>
        <div id="toolsDrawerContent" class="drawer-content" style="display:none;">
          <button id="fogToggleBtn" class="tool-btn fog-btn">Névoa</button>
          <button id="fogEraserBtn" class="tool-btn eraser-btn">Borracha</button>
          <div id="fogSettings" style="display:none;margin-top:8px;">
            <label>Tamanho do pincel:</label>
            <input type="range" id="fogBrushSize" min="10" max="100" value="40" style="width:100%;margin:4px 0;">
            <span id="fogSizeValue">40px</span>
            <button id="fogClearBtn" style="width:100%;margin-top:8px;background:#666;padding:6px;">Limpar Névoa</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Grid Scale Control removed: zoom agora é por scroll e pinça -->

  <!-- Rulers Container -->
  <div class="rulers-container">
    <!-- Top Ruler (Colunas A, B, C, etc) -->
    <canvas id="topRuler" class="ruler ruler-top"></canvas>
    
    <!-- Left Ruler (Linhas 1, 2, 3, etc) -->
    <canvas id="leftRuler" class="ruler ruler-left"></canvas>
    
    <!-- Canvas VTT (Principal) -->
    <canvas id="canvas" class="main-canvas"></canvas>
  </div>

  <!-- Legacy Editor (oculto) -->
  <div id="editor" style="display:none; white-space:pre-wrap; border:1px solid #ccc; padding:10px; min-height:200px">Carregando...</div>

  <script src="js/storage.js"></script>
  <script src="js/vtt.js"></script>
  <script>
    (async function(){
      const params = new URLSearchParams(location.search);
      const filename = params.get('campaign');
      const campaign = filename ? await window.Storage.loadCampaign(filename) : null;
      window.VTT.init(campaign);
    })();
  </script>
</body>
</html>
